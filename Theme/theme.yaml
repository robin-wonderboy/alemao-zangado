name: "O alemão zangado"
colorScheme: "warm"
fontPairing: "literary"
favicons:
   - "images/favicon.png"
css:
   - "css/theme.css"
js:
   - "js/theme.js"
headInlineScript: "(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})()"
logo:
   text: "O alemão zangado"
tokens:
   colorAccent:
      any: "#C45B28"
      dark: "#E87A3A"
   colorAccentHover:
      any: "#A84A1F"
      dark: "#F09050"
   colorBg:
      any: "#FAFAF5"
      dark: "#1A1A18"
   colorBgAlt:
      any: "#F0EDE4"
      dark: "#252520"
   colorBgCard:
      any: "#FFFFFF"
      dark: "#252520"
   colorText:
      any: "#2D2A24"
      dark: "#E8E4D9"
   colorTextSecondary:
      any: "#5C564A"
      dark: "#9E978A"
   colorTextMuted:
      any: "#7A7468"
      dark: "#807A6E"
   colorBorder:
      any: "#D8D2C4"
      dark: "#3A3630"
   colorBorderLight:
      any: "#E8E2D6"
      dark: "#2D2A25"
   colorShadow:
      any: "rgba(45, 42, 36, 0.08)"
      dark: "rgba(0, 0, 0, 0.25)"
   colorShadowLg:
      any: "rgba(45, 42, 36, 0.15)"
      dark: "rgba(0, 0, 0, 0.4)"
   fontHeading:
      family: "Crimson Pro"
      weights: [400, 600, 700]
   fontBody:
      family: "Source Serif 4"
      weights: [400, 600]
   maxWidth: "800px"
   contentWidth: "680px"
   headerHeight: "60px"
   radius: "6px"
   radiusLg: "10px"